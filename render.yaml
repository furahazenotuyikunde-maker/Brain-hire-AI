services:
  - type: web
    name: brain-hire-ai-backend
    env: node
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
