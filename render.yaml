services:
  - type: web
    name: brain-hire-ai-backend
    env: node
    rootDirectory: backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
